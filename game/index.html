<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%2305060a'/%3E%3Cpath d='M12 32h40M32 12v40' stroke='%2332e6ef' stroke-width='6'/%3E%3C/svg%3E">
  <title>XENA: OVERRIDE GRID</title>
  <script>
    /* 화면잠금 시 게임 사운드까지 정지시키기 위해 AudioContext 생성을 미리 등록해 둔다.
       (shared-audio.js 가 이 목록을 읽어 suspend/resume 처리) */
    (function(){
      window.__xAudioCtxs = [];
      ['AudioContext','webkitAudioContext'].forEach(function(k){
        var Orig = window[k];
        if (!Orig) return;
        function Patched(){
          var ctx = new Orig(arguments[0]);
          try{ window.__xAudioCtxs.push(ctx); }catch(e){}
          return ctx;
        }
        Patched.prototype = Orig.prototype;
        window[k] = Patched;
      });
    })();
  </script>
  <link rel="stylesheet" href="./styles.css?v=20260724b">
  <style>
    /* XENA GAMES 복귀 버튼 (게임제작부서 추가 — app.js 재렌더에도 유지되도록 body 직속) */
    #xena-games-back{position:fixed;top:10px;left:12px;z-index:300;
      font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:600;letter-spacing:.14em;
      color:#cfeaf2;text-decoration:none;padding:8px 13px;border:1px solid rgba(63,224,255,.4);border-radius:20px;
      background:rgba(4,6,12,.86);backdrop-filter:blur(10px);white-space:nowrap;transition:.25s ease;}
    #xena-games-back:hover{color:#3fe0ff;border-color:#3fe0ff;box-shadow:0 0 16px rgba(63,224,255,.3);}
    .topbar{padding-left:160px !important;}
    /* 프로필 + XC 를 화면 상단 가운데로 (우측 상단 상점/사운드 버튼과 겹치지 않게).
       position:absolute 이므로 스크롤하면 같이 올라간다 — 고정되지 않음. */
    #xena-topcenter{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:120;
      display:flex;align-items:center;gap:8px;pointer-events:auto;}
    #xena-xc{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:700;letter-spacing:.1em;
      color:#e8c468;padding:8px 13px;border:1px solid rgba(232,196,104,.45);border-radius:20px;
      background:rgba(4,6,12,.86);backdrop-filter:blur(10px);white-space:nowrap;}
    /* shared-identity.js 가 만든 고정 버튼을 이 줄 안으로 편입 */
    #xena-topcenter #xprof-btn{position:static !important;top:auto !important;right:auto !important;
      left:auto !important;transform:none !important;margin:0 !important;}
    @media(max-width:560px){
      #xena-games-back{top:8px;left:8px;font-size:10px;padding:6px 9px;letter-spacing:.08em;}
      .topbar{padding-left:104px !important;}
      #xena-topcenter{top:8px;gap:6px;}
      #xena-xc{font-size:10px;padding:6px 9px;letter-spacing:.05em;}
    }
  </style>
</head>
<body>
  <a href="../games/" id="xena-games-back">&larr; XENA GAMES</a>
  <div id="xena-topcenter"><div id="xena-xc" style="display:none">0 XC</div></div>
  <main id="app"></main>
  <noscript>이 게임을 실행하려면 브라우저에서 JavaScript를 켜주세요.</noscript>

  <script src="../games/shared-identity.js?v=20260721"></script>
  <script src="../games/shared-gate.js?v=20260721"></script>
  <script src="../games/shared-audio.js?v=20260721"></script>
  <script src="../games/shared-wallet.js?v=20260721"></script>
  <script src="./app.js?v=20260724c"></script>
  <script>
    /* XC 잔액 표시 — 이제 미니게임과 완전히 같은 서버 지갑(wallets/{uid}.credits)을 그대로 보여준다.
       체스 자체 재화(크레딧)와 미니게임 XC가 이 시점부터 진짜로 같은 숫자다. */
    (function(){
      var el = document.getElementById('xena-xc');
      function render(){
        var bal = window.XenaWallet ? window.XenaWallet.getBalance() : null;
        el.textContent = (bal === null ? '…' : bal) + ' XC';
      }
      render();
      if (window.XenaWallet) window.XenaWallet.subscribe(render);

      /* shared-identity.js 가 body 에 붙인 프로필 버튼을 상단 가운데 줄로 이동 */
      var row = document.getElementById('xena-topcenter');
      function adopt(){
        var btn = document.getElementById('xprof-btn');
        if (btn && btn.parentNode !== row){ row.insertBefore(btn, row.firstChild); return true; }
        return !!btn;
      }
      if (!adopt()){
        var tries = 0;
        var iv = setInterval(function(){
          if (adopt() || ++tries > 40) clearInterval(iv);
        }, 100);
      }
    })();
  </script>
</body>
</html>
